name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest -q
      - name: Validate BPMN files
        run: |
          python -c "import xml.etree.ElementTree as ET; \
            [ET.parse(f) for f in ['docs/bpmn/findevil_iabf_workflow.bpmn','docs/bpmn/legacy_dfir_workflow.bpmn']]; \
            print('BPMN OK')"
      - name: Smoke-test scorer on naive baseline
        run: |
          python scripts/score.py reports/hacking_case_naive.json reports/ground_truth/hacking_case.json --label "CI-naive"
